<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frog Rank - World Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #4CAF50; --accent: #FF9800; --bg: #f9fbf9; }
        body { font-family: 'Gaegu', cursive; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #333; }
        .container { width: 100%; max-width: 480px; background: white; border-radius: 30px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 6px solid var(--main); position: relative; }
        h1 { font-size: 3.5em; color: var(--main); text-align: center; margin: 0; text-shadow: 2px 2px #e0eee0; }
        .tagline { text-align: center; color: #888; font-size: 1.2em; margin-bottom: 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { padding: 10px; color: #999; font-size: 1.1em; border-bottom: 2px solid #eee; }
        tr.item { background: #fdfdfd; transition: transform 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        tr.item:hover { transform: scale(1.02); }
        td { padding: 15px; font-size: 1.4em; }
        .rank { font-weight: bold; color: var(--main); width: 50px; text-align: center; }
        .name { font-weight: bold; }
        .score { text-align: right; color: var(--accent); font-weight: bold; }
        .top-1 { background: #fff9c4 !important; border: 2px solid #fbc02d; }
        .top-2 { background: #f5f5f5 !important; }
        .top-3 { background: #fff3e0 !important; }
        .loading { text-align: center; padding: 40px; font-size: 1.5em; color: #bbb; }
        footer { margin-top: 25px; font-size: 1em; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐸 Frog Rank</h1>
        <p class="tagline">전 세계 개구리들의 점프 기록!</p>
        <div id="board"><div class="loading">순위를 가져오는 중... 🏃‍♂️</div></div>
    </div>
    <footer>5초마다 자동 업데이트 중 ⚡</footer>
    <script>
        const API = 'https://frogjump-leaderboard.onrender.com/leaderboard?limit=10';
        async function refresh() {
            try {
                const r = await fetch(API); const data = await r.json();
                const b = document.getElementById('board');
                if(!data.length) { b.innerHTML='<div class="loading">기록이 없어요!</div>'; return; }
                let h = '<table><thead><tr><th>순위</th><th>닉네임</th><th style="text-align:right">점수</th></tr></thead><tbody>';
                data.forEach((d, i) => {
                    const rc = i==0?'top-1':i==1?'top-2':i==2?'top-3':'';
                    const medal = i==0?'🏆':i==1?'🥈':i==2?'🥉':'🐸';
                    h += `<tr class="item ${rc}"><td class="rank">${medal}</td><td class="name">${d.nickname}</td><td class="score">${d.score.toLocaleString()}</td></tr>`;
                });
                b.innerHTML = h + '</tbody></table>';
            } catch(e) { document.getElementById('board').innerHTML='<div class="loading" style="color:red">서버 연결 실패 😭</div>'; }
        }
        refresh(); setInterval(refresh, 5000);
    </script>
</body>
</html>
