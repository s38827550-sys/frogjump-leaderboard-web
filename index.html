<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frog Jump Game - Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2E7D32;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--secondary-color);
            margin: 0;
            font-size: 2.5em;
        }

        p.subtitle {
            color: #666;
            margin-top: 10px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .leaderboard-table th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: 700;
        }

        .rank {
            font-weight: bold;
            width: 50px;
            color: var(--primary-color);
        }

        .nickname {
            font-weight: 500;
        }

        .score {
            text-align: right;
            color: var(--secondary-color);
            font-weight: 700;
        }

        .top-1 { background-color: rgba(255, 215, 0, 0.1); }
        .top-2 { background-color: rgba(192, 192, 192, 0.1); }
        .top-3 { background-color: rgba(205, 127, 50, 0.1); }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .error {
            color: #d32f2f;
            text-align: center;
            padding: 20px;
        }

        footer {
            margin-top: 30px;
            font-size: 0.9em;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐸 Frog Jump!</h1>
            <p class="subtitle">실시간 랭킹 보드</p>
        </header>

        <div id="leaderboard-content">
            <div class="loading">순위를 불러오는 중입니다...</div>
        </div>

        <footer>
            &copy; 2026 Frog Jump Game Project
        </footer>
    </div>

    <script>
        // 서버 주소를 자동으로 감지하거나 설정합니다.
        // 현재는 Render 서버 주소를 사용하고 있습니다.
        const API_URL = 'https://frogjump-leaderboard.onrender.com/leaderboard?limit=10';

        async function fetchLeaderboard() {
            const content = document.getElementById('leaderboard-content');
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('네트워크 응답에 문제가 있습니다.');
                
                const data = await response.json();
                
                if (data.length === 0) {
                    content.innerHTML = '<div class="loading">아직 등록된 기록이 없습니다.</div>';
                    return;
                }

                let html = `
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>순위</th>
                                <th>닉네임</th>
                                <th style="text-align: right;">점수</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.forEach((item, index) => {
                    const rank = index + 1;
                    const rowClass = rank <= 3 ? `top-${rank}` : '';
                    html += `
                        <tr class="${rowClass}">
                            <td class="rank">${rank}</td>
                            <td class="nickname">${item.nickname}</td>
                            <td class="score">${item.score.toLocaleString()}</td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                content.innerHTML = html;

            } catch (error) {
                console.error('Error:', error);
                content.innerHTML = `
                    <div class="error">
                        데이터를 불러오지 못했습니다.<br>
                        서버가 실행 중인지 확인해 주세요.
                    </div>
                `;
            }
        }

        // 초기 실행 및 5초마다 갱신
        fetchLeaderboard();
        setInterval(fetchLeaderboard, 5000);
    </script>
</body>
</html>
