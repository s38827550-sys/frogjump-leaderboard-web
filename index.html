<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Frog Jump Leaderboard</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h1 { margin-bottom: 10px; }
    ol { padding-left: 20px; }
    li { margin: 6px 0; }
    .updated { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h1>🏆 Frog Jump Leaderboard</h1>
  <p class="updated">자동 새로고침 (5초)</p>
  <ol id="list"></ol>

  <script>
    const API_BASE = "https://frogjump-leaderboard.onrender.com";

    async function load() {
      const res = await fetch(`${API_BASE}/leaderboard?limit=10`);
      const data = await res.json();

      const ol = document.getElementById("list");
      ol.innerHTML = "";

      data.forEach((r, i) => {
        const li = document.createElement("li");
        li.textContent = `${i + 1}. ${r.nickname} - ${r.score}`;
        ol.appendChild(li);
      });
    }

    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
